<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#006b5b" />
    <title>Offline | Mietfolio</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fb;
        color: #16202a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 440px);
        border: 1px solid #e4e8ef;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(22, 32, 42, 0.12);
        padding: 28px;
      }

      img {
        width: 48px;
        height: 48px;
      }

      h1 {
        margin: 24px 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #5a6573;
        line-height: 1.6;
      }

      button {
        margin-top: 24px;
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        background: #006b5b;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        padding: 0 18px;
        cursor: pointer;
      }

      button:focus {
        outline: 3px solid rgba(0, 107, 91, 0.24);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.svg" alt="Mietfolio" />
      <h1>Sie sind offline</h1>
      <p>Mietfolio kann diese Seite gerade nicht laden. Prüfen Sie Ihre Verbindung und versuchen Sie es erneut.</p>
      <button type="button" onclick="window.location.reload()">Erneut versuchen</button>
    </main>
  </body>
</html>
