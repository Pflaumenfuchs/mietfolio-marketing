<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Seite nicht gefunden | Mietfolio</title>
    <meta name="description" content="Diese Mietfolio-Seite wurde nicht gefunden." />
    <link rel="canonical" href="https://mietfolio.de/" />
    <link rel="icon" sizes="any" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fbfdfc;
        color: #0b1422;
        font-family: Inter, Arial, sans-serif;
      }

      main {
        max-width: 34rem;
        padding: 2rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 9vw, 5rem);
        line-height: 1;
      }

      p {
        margin: 1rem 0 0;
        color: #5c6b74;
        line-height: 1.6;
      }

      .app-icon {
        width: 3rem;
        height: 3rem;
        border: 1px solid rgba(10, 102, 87, 0.15);
        border-radius: 0.5rem;
        box-shadow: 0 8px 24px rgba(3, 36, 32, 0.08);
      }

      a {
        display: inline-flex;
        margin-top: 1.5rem;
        color: #006b5b;
        font-weight: 700;
        text-decoration: underline;
        text-underline-offset: 0.25rem;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="app-icon" src="/logo.svg" alt="" />
      <h1>404</h1>
      <p>Diese Mietfolio-Seite wurde nicht gefunden.</p>
      <a href="/">Zur Startseite</a>
    </main>
  </body>
</html>
